name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        run: npx @capacitor/cli add android || true

      - name: Generate Assets
        run: npm run assets

      - name: Sync Capacitor
        run: npx @capacitor/cli sync android

      - name: Build APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        if: env.HAS_KEYSTORE == 'true'
        run: |
          # Trova l'ultima versione dei build-tools installata
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -n 1)
          echo "Using build tools from: $BUILD_TOOLS_PATH"
          
          # Aggiungi i build-tools al PATH per trovare apksigner e zipalign
          export PATH=$PATH:$BUILD_TOOLS_PATH
          
          # Estrai il Keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
          
          # Firma l'APK
          apksigner sign --ks android/app/release.jks \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Generate Changelog
        id: changelog
        run: |
          # Ottiene i messaggi dei commit dall'ultimo tag (o dall'inizio se non ci sono tag)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"* %s (%h)")
          else
            CHANGELOG=$(git log $LATEST_TAG..HEAD --pretty=format:"* %s (%h)")
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Nessuna modifica rilevata (build manuale o nessun nuovo commit)."
          fi
          
          # Scrive il changelog in un file temporaneo per gestirlo nel body della release
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload Signed APK Artifact
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: android/app/build/outputs/apk/release/app-release-signed.apk

      - name: Create GitHub Release
        if: env.HAS_KEYSTORE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release-signed.apk
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Build' }}
          body: |
            ### 📝 Cosa è cambiato in questa versione:
            ${{ env.CHANGES }}
            
            ---
            *Build automatica generata da GitHub Actions*
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
